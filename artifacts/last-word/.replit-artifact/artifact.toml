kind = "web"
previewPath = "/"
title = "Last Word"
version = "1.0.0"
id = "artifacts/last-word"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18165

[services.development]
run = "pnpm --filter @workspace/last-word run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/last-word", "run", "build" ]
publicDir = "artifacts/last-word/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18165"
BASE_PATH = "/"
